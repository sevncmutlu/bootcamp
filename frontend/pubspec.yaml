name: maki_app
description: "Maki kişisel finans uygulaması."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  drift: ^2.24.0
  sqlite3: ^2.5.0
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.3
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  http: ^1.2.2
  fl_chart: ^0.70.2
  flutter_secure_storage: ^9.2.2
  http_parser: ^4.1.0
  flutter_markdown_plus: ^1.0.12
  maki_finance_core:
    path: ../packages/maki_finance_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.24.0
  build_runner: ^2.4.11
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/mascot/

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
