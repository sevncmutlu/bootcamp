name: maki_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  drift: ^2.24.0
  sqlite3: ^2.5.0
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.3
  path: ^1.9.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.24.0
  build_runner: ^2.4.11
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
