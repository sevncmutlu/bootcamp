extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  attributes/privacy:
    actions:
      - key: amount
        action: delete
      - key: balance
        action: delete
      - key: merchant_name
        action: delete
      - key: user.email
        action: delete
  batch:
    send_batch_size: 512
    timeout: 5s

exporters:
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, batch]
      exporters: [debug]
