name: maki

x-backend-environment: &backend-environment
  MAKI_DATABASE__DSN: postgresql+asyncpg://maki:${MAKI_POSTGRES_PASSWORD:?MAKI_POSTGRES_PASSWORD gerekli}@postgres:5432/maki
  MAKI_ENVIRONMENT: test
  MAKI_REDIS__DSN: redis://redis:6379/0
  MAKI_TELEMETRY__OTLP_ENDPOINT: http://otel:4317

x-process-security: &process-security
  read_only: true
  tmpfs:
    - /tmp:size=256M,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  init: true
  stop_grace_period: 30s
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-file: "3"
      max-size: 10m

x-process-health: &process-health
  test: [CMD, python, -m, maki.workers.health]
  interval: 15s
  timeout: 3s
  start_period: 20s
  retries: 5

services:
  postgres:
    image: postgres:17.9-alpine
    user: "70:70"
    environment:
      POSTGRES_DB: maki
      POSTGRES_PASSWORD: ${MAKI_POSTGRES_PASSWORD:?MAKI_POSTGRES_PASSWORD gerekli}
      POSTGRES_USER: maki
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /run/postgresql:size=16M,mode=0770,uid=70,gid=70
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    stop_grace_period: 60s
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U maki -d maki"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  redis:
    image: redis:8.8.0-alpine
    user: "999:999"
    command: [redis-server, --appendonly, "yes", --save, "60", "1"]
    volumes:
      - redis_data:/data
    networks: [backend]
    read_only: true
    tmpfs:
      - /tmp:size=32M,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    stop_grace_period: 30s
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  otel:
    image: otel/opentelemetry-collector-contrib:0.153.0
    user: "10001:10001"
    command: [--config=/etc/otelcol-contrib/config.yaml]
    volumes:
      - ../otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks: [backend]
    read_only: true
    tmpfs:
      - /tmp:size=32M,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - /otelcol-contrib
        - validate
        - --config=/etc/otelcol-contrib/config.yaml
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  migration:
    <<: *process-security
    image: maki-api:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: api
    entrypoint: [alembic]
    command: [upgrade, head]
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks: [backend]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  api:
    <<: *process-security
    image: maki-api:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: api
    environment: *backend-environment
    depends_on:
      migration:
        condition: service_completed_successfully
      otel:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend, edge]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  dispatcher:
    <<: *process-security
    image: maki-dispatcher:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: dispatcher
    environment: *backend-environment
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck: *process-health
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  worker-forecast:
    <<: *process-security
    profiles: [workers]
    image: maki-worker-forecast:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker-forecast
    environment: *backend-environment
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck: *process-health
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G

  worker-coach:
    <<: *process-security
    profiles: [providers]
    image: maki-worker-coach:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker-coach
    environment:
      <<: *backend-environment
      MAKI_ANTHROPIC_API_KEY: ${MAKI_ANTHROPIC_API_KEY:-}
      MAKI_ANTHROPIC_MODEL: ${MAKI_ANTHROPIC_MODEL:-claude-sonnet-4-6}
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck: *process-health
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  worker-ocr:
    <<: *process-security
    profiles: [providers]
    image: maki-worker-ocr:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker-ocr
    environment:
      <<: *backend-environment
      MAKI_OCR__DETECTION_MODEL_DIR: /models/detection
      MAKI_OCR__RECOGNITION_MODEL_DIR: /models/recognition
    volumes:
      - ${MAKI_OCR_MODELS_DIR:-./models}:/models:ro
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck:
      <<: *process-health
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G

  worker-data:
    <<: *process-security
    image: maki-worker-data:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker-data
    environment: *backend-environment
    depends_on:
      migration:
        condition: service_completed_successfully
    networks: [backend]
    healthcheck: *process-health
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

networks:
  backend:
    internal: true
  edge:

volumes:
  postgres_data:
  redis_data:
